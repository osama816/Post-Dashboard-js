<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Dashboard | ITI Student Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>

<body>
    <nav class="navbar navbar-dark mb-4 p-3">
        <div class="container">
            <span class="navbar-brand mb-0 h1 fw-bold">Post Dashboard</span>
        </div>
    </nav>
    <!-- Alert Container -->
    <div id="alertContainer"></div>

    <div class="container">
        <!-- Controls Section -->
        <div class="row g-3 mb-4 align-items-end">
            <div class="col-md-4">
                <label for="userSelect" class="form-label fw-bold">Select User</label>
                <select id="userSelect" class="form-select shadow-sm">
                    <option value="" selected disabled>Loading users...</option>
                </select>
            </div>
            <div class="col-md-5">
                <label for="searchInput" class="form-label fw-bold">Search Posts</label>
                <input type="text" id="searchInput" class="form-control shadow-sm" placeholder="Search by title...">
            </div>
            <div class="col-md-3 d-grid">
                <button id="reloadBtn" class="btn btn-primary shadow-sm fw-bold">
                    Reload Data
                </button>
            </div>
        </div>



        <!-- Dashboard Header -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-bold text-dark">User Posts <span id="postsCount"
                    class="badge bg-secondary badge-count">0</span></h4>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="d-none">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
            </div>
        </div>


        <div id="postsGrid" class="row">
            <div class="col-12 text-center text-muted py-5">
                <p>Select a user to view their posts.</p>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ES6 Modules Entry Point -->
    <script type="module" src="./app/main.js"></script>
</body>

</html>
